name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install deps (base + watch extra + ruff)
        # only the base deps + `watch` (watchdog, needed by test_watcher); the
        # `local` extra pulls torch and is imported lazily, so CI skips it.
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e '.[watch]' ruff

      - name: Lint (ruff)
        run: .venv/bin/ruff check .

      - name: Tests
        # each test_*.py self-runs via its __main__ block; a failed assert exits
        # non-zero and fails the step. Live Voyage tests self-skip (no API key).
        run: |
          for t in test_*.py; do
            echo "::group::$t"
            .venv/bin/python "$t"
            echo "::endgroup::"
          done
